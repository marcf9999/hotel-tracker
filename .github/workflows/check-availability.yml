name: Check Marriott Availability

on:
  schedule:
    # Every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch: # Allow manual runs

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Chrome and dependencies
        run: |
          pip install nodriver python-dotenv curl_cffi
          sudo apt-get update
          sudo apt-get install -y xvfb google-chrome-stable || true

      - name: Run availability check
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          USE_NODRIVER: "true"
        run: xvfb-run --auto-servernum python checker.py
