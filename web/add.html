<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Hotel — Hotel Tracker</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <a href="index.html" class="back">&larr; Back to Hotels</a>
    <h1 style="margin-bottom:24px;">Add Hotel</h1>

    <div class="card">
      <form id="add-form">
        <div class="form-group">
          <label for="source">Booking System</label>
          <select id="source">
            <option value="marriott">Marriott</option>
            <option value="windsurfer">Other (Windsurfer/Direct)</option>
            <option value="airbnb">Airbnb</option>
          </select>
        </div>
        <div class="form-group">
          <label for="hotel_name">Hotel Name</label>
          <input type="text" id="hotel_name" placeholder="e.g. Cleveland Marriott East" required>
        </div>
        <div class="form-group" id="code-group">
          <label for="property_code">Property Code</label>
          <input type="text" id="property_code" placeholder="e.g. CLECE" maxlength="20" style="text-transform:uppercase;">
          <small class="card-meta">Marriott: in the URL — marriott.com/hotels/<strong>clece</strong>-name/</small>
        </div>
        <div class="form-group" id="url-group" style="display:none;">
          <label for="booking_url">Booking Page URL</label>
          <input type="url" id="booking_url" placeholder="https://res.windsurfercrs.com/ibe/index.aspx?propertyID=...">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="checkin">Check-in Date</label>
            <input type="date" id="checkin" required>
          </div>
          <div class="form-group">
            <label for="checkout">Check-out Date</label>
            <input type="date" id="checkout" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary">Add Hotel</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    const sourceSelect = document.getElementById('source');
    sourceSelect.addEventListener('change', () => {
      const val = sourceSelect.value;
      document.getElementById('code-group').style.display = val === 'marriott' ? 'block' : 'none';
      document.getElementById('url-group').style.display = val === 'marriott' ? 'none' : 'block';
      var urlInput = document.getElementById('booking_url');
      if (val === 'airbnb') {
        urlInput.placeholder = 'https://www.airbnb.com/rooms/...';
      } else {
        urlInput.placeholder = 'https://res.windsurfercrs.com/ibe/index.aspx?propertyID=...';
      }
    });

    document.getElementById('add-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const source = sourceSelect.value;
      const name = document.getElementById('hotel_name').value.trim();
      const checkin = document.getElementById('checkin').value;
      const checkout = document.getElementById('checkout').value;

      if (new Date(checkout) <= new Date(checkin)) {
        showToast('Check-out must be after check-in', 'error');
        return;
      }

      const row = {
        hotel_name: name,
        checkin_date: checkin,
        checkout_date: checkout,
        source: source,
      };

      if (source === 'marriott') {
        row.property_code = document.getElementById('property_code').value.trim().toUpperCase();
        if (!row.property_code) { showToast('Property code is required', 'error'); return; }
      } else {
        const url = document.getElementById('booking_url').value.trim();
        if (!url) { showToast('Booking URL is required', 'error'); return; }
        row.booking_url = url;
        // Generate a code from the URL
        if (source === 'airbnb') {
          const roomMatch = url.match(/\/rooms\/(\d+)/);
          row.property_code = roomMatch ? `ABB-${roomMatch[1].substring(0, 10)}` : name.substring(0, 10).toUpperCase().replace(/\s/g, '-');
        } else {
          const propMatch = url.match(/propertyID=(\d+)/i);
          row.property_code = propMatch ? `WS-${propMatch[1]}` : name.substring(0, 10).toUpperCase().replace(/\s/g, '-');
        }
      }

      const { data, error } = await supabase.from('hotels').insert(row).select().single();

      if (error) {
        showToast('Error: ' + error.message, 'error');
        return;
      }

      showToast('Hotel added!');
      setTimeout(() => location.href = 'index.html', 500);
    });
  </script>
</body>
</html>
