<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Details — Hotel Tracker</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <a href="index.html" class="back">&larr; Back to Hotels</a>

    <div id="hotel-detail">
      <div class="loading">Loading...</div>
    </div>

    <div id="date-editor" style="display:none;" class="card" style="margin-top:16px;">
      <h3 style="margin-bottom:12px;">Edit Dates</h3>
      <div style="display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap;">
        <div class="form-group" style="margin:0;flex:1;min-width:140px;">
          <label for="edit-checkin">Check-in</label>
          <input type="date" id="edit-checkin">
        </div>
        <div class="form-group" style="margin:0;flex:1;min-width:140px;">
          <label for="edit-checkout">Check-out</label>
          <input type="date" id="edit-checkout">
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-primary btn-sm" onclick="saveDates()">Save</button>
          <button class="btn btn-secondary btn-sm" onclick="hideDateEditor()">Cancel</button>
        </div>
      </div>
    </div>

    <h3 style="margin: 32px 0 16px;">Night Availability</h3>
    <div id="night-grid" class="night-grid">
      <div class="loading">Loading...</div>
    </div>

    <h3 style="margin: 32px 0 16px;">Check History</h3>
    <div id="check-history">
      <div class="loading">Loading...</div>
    </div>
    <div id="pagination" class="pagination"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    var hotelId = new URLSearchParams(location.search).get('id');
    var PAGE_SIZE = 20;
    var currentPage = 0;
    var currentHotel = null;

    async function loadHotel() {
      var { data: hotel, error } = await supabase
        .from('hotels')
        .select('*')
        .eq('id', hotelId)
        .single();

      if (error || !hotel) {
        document.getElementById('hotel-detail').innerHTML = '<div class="empty"><p>Hotel not found.</p></div>';
        return;
      }

      currentHotel = hotel;

      // Build booking link based on source
      var bookingUrl, bookingLabel;
      if (hotel.source === 'airbnb' && hotel.booking_url) {
        bookingUrl = hotel.booking_url + '?check_in=' + hotel.checkin_date + '&check_out=' + hotel.checkout_date + '&adults=1';
        bookingLabel = 'View on Airbnb';
      } else if (hotel.source === 'windsurfer' && hotel.booking_url) {
        var ci = hotel.checkin_date.split('-');
        var co = hotel.checkout_date.split('-');
        bookingUrl = hotel.booking_url + '&checkin=' + ci[1] + '/' + ci[2] + '/' + ci[0] + '&checkout=' + co[1] + '/' + co[2] + '/' + co[0];
        bookingLabel = 'Book Now';
      } else {
        var ci = hotel.checkin_date.split('-');
        var co = hotel.checkout_date.split('-');
        bookingUrl = 'https://www.marriott.com/reservation/rateListMenu.mi?propertyCode=' + hotel.property_code + '&checkInDate=' + ci[1] + '/' + ci[2] + '/' + ci[0] + '&checkOutDate=' + co[1] + '/' + co[2] + '/' + co[0];
        bookingLabel = 'Book on Marriott';
      }

      document.title = hotel.hotel_name + ' \u2014 Hotel Tracker';
      document.getElementById('hotel-detail').innerHTML =
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;">' +
          '<div>' +
            '<h1 style="font-size:1.5rem;margin-bottom:4px;">' + hotel.hotel_name + '</h1>' +
            '<div class="card-meta">' +
              '<span>' + hotel.property_code + '</span>' +
              '<span class="editable-dates" onclick="showDateEditor()" title="Click to edit dates">' + formatDate(hotel.checkin_date) + ' \u2014 ' + formatDate(hotel.checkout_date) + '</span>' +
              '<span>' + (hotel.is_active ? 'Active' : 'Paused') + '</span>' +
            '</div>' +
            '<div class="card-meta" style="margin-top:6px;">' +
              bookingWindowDetail(hotel) +
            '</div>' +
          '</div>' +
          '<div style="display:flex;gap:8px;flex-wrap:wrap;">' +
            '<a href="' + bookingUrl + '" target="_blank" class="btn btn-primary btn-sm">' + bookingLabel + '</a>' +
            '<button class="btn btn-secondary btn-sm" onclick="checkNow()">Check Now</button>' +
            '<button class="btn btn-secondary btn-sm" onclick="toggleActive(\'' + hotel.id + '\', ' + !hotel.is_active + ')">' + (hotel.is_active ? 'Pause' : 'Resume') + '</button>' +
            '<button class="btn btn-danger btn-sm" onclick="deleteHotel(\'' + hotel.id + '\')">Delete</button>' +
          '</div>' +
        '</div>';

      // Pre-fill date editor
      document.getElementById('edit-checkin').value = hotel.checkin_date;
      document.getElementById('edit-checkout').value = hotel.checkout_date;
    }

    async function loadNights() {
      var { data: runs } = await supabase
        .from('check_runs')
        .select('id')
        .eq('hotel_id', hotelId)
        .order('checked_at', { ascending: false })
        .limit(1);

      if (!runs || !runs.length) {
        document.getElementById('night-grid').innerHTML = '<div class="empty"><p>No check data yet.</p></div>';
        return;
      }

      var { data: nights } = await supabase
        .from('night_availability')
        .select('*')
        .eq('check_run_id', runs[0].id)
        .order('night_date', { ascending: true });

      if (!nights || !nights.length) {
        document.getElementById('night-grid').innerHTML = '<div class="empty"><p>No per-night data available yet.</p></div>';
        return;
      }

      document.getElementById('night-grid').innerHTML = nights.map(function(n) {
        var cls = n.is_available ? 'available' : 'unavailable';
        var priceHtml = n.price_cents
          ? '<div class="price">$' + (n.price_cents / 100).toFixed(0) + '</div>'
          : '<div class="price no-price">' + (n.is_available ? 'See site' : '\u2014') + '</div>';
        var statusLabel = n.is_available ? 'Available' : 'Not available';
        var d = new Date(n.night_date + 'T00:00:00');
        var dayLabel = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

        return '<div class="night-cell ' + cls + '">' +
            '<div class="date">' + dayLabel + '</div>' +
            priceHtml +
            '<div class="status" style="color: ' + (n.is_available ? 'var(--green)' : 'var(--text-muted)') + '">' + statusLabel + '</div>' +
          '</div>';
      }).join('');
    }

    async function loadHistory(page) {
      if (page === undefined) page = 0;
      currentPage = page;
      var from = page * PAGE_SIZE;
      var to = from + PAGE_SIZE - 1;

      var { data: runs, error, count } = await supabase
        .from('check_runs')
        .select('*', { count: 'exact' })
        .eq('hotel_id', hotelId)
        .order('checked_at', { ascending: false })
        .range(from, to);

      if (!runs || !runs.length) {
        document.getElementById('check-history').innerHTML = '<div class="empty"><p>No checks recorded yet.</p></div>';
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      var rows = runs.map(function(r) {
        return '<tr>' +
          '<td style="white-space:nowrap;">' + formatDateTime(r.checked_at) + '</td>' +
          '<td>' + statusBadge(r.status) + '</td>' +
          '<td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + (r.details || '').replace(/"/g, '&quot;') + '">' + (r.details || '\u2014') + '</td>' +
          '<td>' + (r.calendar_bytes ? (r.calendar_bytes / 1024).toFixed(0) + 'K' : '\u2014') + '</td>' +
          '<td>' + (r.rates_bytes ? (r.rates_bytes / 1024).toFixed(0) + 'K' : '\u2014') + '</td>' +
          '<td>' + (r.checker_mode || '\u2014') + '</td>' +
        '</tr>';
      }).join('');

      document.getElementById('check-history').innerHTML =
        '<table><thead><tr><th>Time</th><th>Status</th><th>Details</th><th>Cal</th><th>Rates</th><th>Mode</th></tr></thead>' +
        '<tbody>' + rows + '</tbody></table>';

      var totalPages = Math.ceil((count || 0) / PAGE_SIZE);
      if (totalPages > 1) {
        var btns = '<button ' + (page === 0 ? 'disabled' : '') + ' onclick="loadHistory(' + (page - 1) + ')">&laquo; Prev</button>';
        for (var i = 0; i < totalPages && i < 10; i++) {
          btns += '<button class="' + (i === page ? 'active' : '') + '" onclick="loadHistory(' + i + ')">' + (i + 1) + '</button>';
        }
        btns += '<button ' + (page >= totalPages - 1 ? 'disabled' : '') + ' onclick="loadHistory(' + (page + 1) + ')">Next &raquo;</button>';
        document.getElementById('pagination').innerHTML = btns;
      } else {
        document.getElementById('pagination').innerHTML = '';
      }
    }

    function showDateEditor() {
      document.getElementById('date-editor').style.display = 'block';
    }

    function hideDateEditor() {
      document.getElementById('date-editor').style.display = 'none';
    }

    async function saveDates() {
      var checkin = document.getElementById('edit-checkin').value;
      var checkout = document.getElementById('edit-checkout').value;
      if (!checkin || !checkout) { showToast('Both dates required', 'error'); return; }
      if (new Date(checkout) <= new Date(checkin)) { showToast('Check-out must be after check-in', 'error'); return; }
      var { error } = await supabase.from('hotels').update({
        checkin_date: checkin,
        checkout_date: checkout,
        updated_at: new Date().toISOString()
      }).eq('id', hotelId);
      if (error) { showToast('Error: ' + error.message, 'error'); return; }
      showToast('Dates updated');
      hideDateEditor();
      loadHotel();
      loadNights();
    }

    async function checkNow() {
      showToast('Triggering check...');
      try {
        var resp = await fetch(SUPABASE_URL + '/functions/v1/trigger-check', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });
        var data = await resp.json();
        if (data.ok) {
          showToast('Check triggered — results in ~2 min. Refresh the page shortly.');
        } else {
          showToast('Trigger failed: ' + (data.error || data.body || 'unknown error'), 'error');
        }
      } catch (e) {
        showToast('Could not trigger check: ' + e.message, 'error');
      }
    }

    async function toggleActive(id, active) {
      await supabase.from('hotels').update({ is_active: active, updated_at: new Date().toISOString() }).eq('id', id);
      showToast(active ? 'Tracking resumed' : 'Tracking paused');
      loadHotel();
    }

    async function deleteHotel(id) {
      if (!confirm('Delete this hotel and all its check history?')) return;
      await supabase.from('night_availability').delete().eq('hotel_id', id);
      await supabase.from('check_runs').delete().eq('hotel_id', id);
      await supabase.from('hotels').delete().eq('id', id);
      location.href = 'index.html';
    }

    loadHotel();
    loadNights();
    loadHistory();
  </script>
</body>
</html>
