<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Tracker</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Hotel Tracker</h1>
      <nav>
        <a href="add.html">+ Add Hotel</a>
        <a href="settings.html">Settings</a>
        <a href="#" onclick="checkAll(event)" id="check-all-btn">Check All</a>
      </nav>
    </header>

    <div id="hotel-list">
      <div class="loading">Loading hotels...</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    async function loadHotels() {
      const container = document.getElementById('hotel-list');

      if (!supabase) {
        container.innerHTML = '<div class="empty"><p>Database connection failed. Check browser console (F12).</p></div>';
        return;
      }

      try {
        // Get hotels
        const { data: hotels, error } = await supabase
          .from('hotels')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) {
          container.innerHTML = `<div class="empty"><p>Error loading hotels: ${error.message}</p></div>`;
          return;
        }

      if (!hotels.length) {
        container.innerHTML = `<div class="empty"><p>No hotels being tracked yet.</p><a href="add.html" class="btn btn-primary">Add Your First Hotel</a></div>`;
        return;
      }

      // Get latest check run for each hotel
      const hotelIds = hotels.map(h => h.id);
      const { data: runs } = await supabase
        .from('check_runs')
        .select('*')
        .in('hotel_id', hotelIds)
        .order('checked_at', { ascending: false });

      // Get latest night availability for each hotel
      const { data: nights } = await supabase
        .from('night_availability')
        .select('*')
        .in('hotel_id', hotelIds)
        .order('night_date', { ascending: true });

      // Group by hotel
      const latestRun = {};
      const latestNights = {};
      for (const r of (runs || [])) {
        if (!latestRun[r.hotel_id]) latestRun[r.hotel_id] = r;
      }

      // For nights, get only from the latest check_run per hotel
      for (const h of hotels) {
        const run = latestRun[h.id];
        if (run) {
          latestNights[h.id] = (nights || []).filter(n => n.check_run_id === run.id);
        }
      }

      container.innerHTML = hotels.map(h => {
        const run = latestRun[h.id];
        const hotelNights = latestNights[h.id] || [];
        const availCount = hotelNights.filter(n => n.is_available).length;
        const totalNights = hotelNights.length;

        let nightSummary = '';
        if (totalNights > 0) {
          const pricedNights = hotelNights.filter(n => n.price_cents);
          if (pricedNights.length) {
            const lowest = Math.min(...pricedNights.map(n => n.price_cents));
            nightSummary = `<span>${availCount}/${totalNights} nights available — from $${(lowest/100).toFixed(0)}/night</span>`;
          } else {
            nightSummary = `<span>${availCount}/${totalNights} nights available</span>`;
          }
        }

        return `
          <div class="card" style="position:relative;">
            <a href="hotel.html?id=${h.id}">
              <div class="card-header">
                <h2>${h.hotel_name || h.property_code}</h2>
                ${bookingWindowBadge(h)}
                ${run ? statusBadge(run.status) : '<span class="badge badge-no-data">No checks yet</span>'}
              </div>
              <div class="card-meta">
                <span>${h.property_code}</span>
                <span>${formatDate(h.checkin_date)} — ${formatDate(h.checkout_date)}</span>
                ${nightSummary}
              </div>
              ${run ? `<div class="card-meta" style="margin-top:6px;"><span>Last checked: ${formatDateTime(run.checked_at)}</span></div>` : ''}
            </a>
            <button class="btn-delete-card" onclick="deleteHotel(event, '${h.id}', '${(h.hotel_name || h.property_code).replace(/'/g, "\\'")}')" title="Delete">&times;</button>
          </div>
        `;
      }).join('');
      } catch (err) {
        container.innerHTML = `<div class="empty"><p>Error: ${err.message}</p></div>`;
        console.error(err);
      }
    }

    async function deleteHotel(e, id, name) {
      e.preventDefault();
      e.stopPropagation();
      if (!confirm('Delete "' + name + '" and all its check history?')) return;
      await supabase.from('night_availability').delete().eq('hotel_id', id);
      await supabase.from('check_runs').delete().eq('hotel_id', id);
      await supabase.from('hotels').delete().eq('id', id);
      showToast('Hotel deleted');
      loadHotels();
    }

    async function checkAll(e) {
      if (e) { e.preventDefault(); e.stopPropagation(); }
      var btn = document.getElementById('check-all-btn');
      btn.textContent = 'Checking...';
      btn.style.pointerEvents = 'none';
      try {
        await fetch('https://api.github.com/repos/marcf9999/hotel-tracker/dispatches', {
          method: 'POST',
          headers: { 'Accept': 'application/vnd.github.v3+json' },
          body: JSON.stringify({ event_type: 'check_now' })
        });
      } catch (e) {}
      showToast('Check triggered — results in ~2 min. Refresh the page shortly.');
      setTimeout(function() { btn.textContent = 'Check All'; btn.style.pointerEvents = ''; }, 3000);
    }

    // Wait for DOM and scripts to be ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', loadHotels);
    } else {
      loadHotels();
    }
  </script>
</body>
</html>
